<!DOCTYPE html>
<html>

<head>

    <title>Hasiru-Usiru Mapper</title>

    <!-- Bootstrap -->

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- Leaflet CSS -->

    <link rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <!-- Font Awesome -->

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

    <!-- Custom CSS -->

    <link rel="stylesheet" href="css/style.css">

    <style>

        /* LIGHT MODE */

        body{

            background-color: #f8f9fa;
            color: black;
            transition: 0.4s;

        }

        /* DARK MODE FULL PAGE */

        .dark-mode{

            background-color: #121212 !important;
            color: white !important;

        }

        /* NAVBAR */

        .dark-mode .navbar{

            background-color: #000 !important;

        }

        /* HERO SECTION */

        .dark-mode .hero h1,
        .dark-mode .hero p{

            color: white !important;

        }

        /* CARDS AND FORM */

        .dark-mode .bg-white,
        .dark-mode .card,
        .dark-mode .shadow{

            background-color: #1e1e1e !important;
            color: white !important;

        }

        /* INPUTS */

        .dark-mode .form-control,
        .dark-mode .input-group-text,
        .dark-mode select{

            background-color: #2b2b2b !important;
            color: white !important;
            border: 1px solid #555 !important;

        }

        /* PLACEHOLDER */

        .dark-mode ::placeholder{

            color: #ccc !important;

        }

        /* BUTTONS */

        .dark-mode .btn-light{

            background-color: #444 !important;
            color: white !important;
            border: none;

        }

        /* TEXT */

        .dark-mode h1,
        .dark-mode h2,
        .dark-mode h3,
        .dark-mode h4,
        .dark-mode h5,
        .dark-mode h6,
        .dark-mode p,
        .dark-mode b,
        .dark-mode label,
        .dark-mode span{

            color: white !important;

        }

        /* TREE CARDS */

        .dark-mode .card-body{

            background-color: #1e1e1e !important;

        }

        /* SEARCH BOX */

        .dark-mode .input-group{

            border: 1px solid #555;

        }

        /* MAP */

        .dark-mode #map{

            border: 2px solid #444;

        }

    </style>

</head>

<body class="bg-light">

<!-- Navbar -->

<nav class="navbar navbar-expand-lg bg-success">

    <div class="container-fluid">

        <a class="navbar-brand text-white fw-bold"
        href="#">

        🌱 Hasiru-Usiru Mapper

        </a>

        <!-- RIGHT SIDE BUTTONS -->

        <div class="d-flex align-items-center">

            <!-- Dark Mode Button -->

            <button
            class="btn btn-dark me-2"
            onclick="toggleDarkMode()">

            🌙 Dark Mode

            </button>

            <!-- Dashboard -->

            <a href="dashboard.html"
            class="btn btn-light me-2">

            Dashboard

            </a>

            <!-- Species -->

            <a href="species.html"
            class="btn btn-warning">

            Species

            </a>

        </div>

    </div>

</nav>

<!-- Hero Section -->

<div class="hero text-center mt-5">

    <h1 class="text-success">

        Save Nature Save Future

    </h1>

    <p class="fs-4">

        Environmental Monitoring System

    </p>

</div>

<!-- Top Search Bar -->

<div class="container mt-4">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="input-group shadow">

                <span class="input-group-text bg-success text-white">

                    <i class="fa-solid fa-magnifying-glass"></i>

                </span>

                <input type="text"
                id="searchInput"
                class="form-control p-3"
                placeholder="Search Tree Name, Location or Species"
                onkeyup="searchTrees()">

            </div>

        </div>

    </div>

</div>

<!-- Dashboard Buttons -->

<div class="container mt-5">

    <div class="row text-center">

        <!-- Total Trees -->

        <div class="col-md-4 mb-3">

            <a href="trees.html"
            class="btn btn-success w-100 p-4 shadow rounded text-white">

                <i class="fa-solid fa-tree fa-3x"></i>

                <h3 class="mt-3">
                    Total Trees
                </h3>

                <h1 id="treeCount">
                    0
                </h1>

            </a>

        </div>

        <!-- Oxygen -->

        <div class="col-md-4 mb-3">

            <button
            class="btn btn-primary w-100 p-4 shadow rounded">

                <i class="fa-solid fa-wind fa-3x"></i>

                <h3 class="mt-3">
                    Oxygen Score
                </h3>

                <h1 id="oxygenScore">
                    0
                </h1>

            </button>

        </div>

        <!-- Pollution -->

        <div class="col-md-4 mb-3">

            <button
            class="btn btn-danger w-100 p-4 shadow rounded">

                <i class="fa-solid fa-smog fa-3x"></i>

                <h3 class="mt-3">
                    Pollution
                </h3>

                <h1>
                    Low
                </h1>

            </button>

        </div>

    </div>

</div>

<!-- Tree Form -->

<div class="container mt-5">

    <div class="shadow p-4 bg-white rounded">

        <h2 class="text-success mb-4">

            Add Tree Information

        </h2>

        <div class="row g-3">

            <!-- Tree Name -->

            <div class="col-md-3">

                <input type="text"
                id="treeName"
                class="form-control"
                placeholder="Enter Tree Name">

            </div>

            <!-- Location -->

            <div class="col-md-2">

                <input type="text"
                id="treeLocation"
                class="form-control"
                placeholder="Enter Location">

            </div>

            <!-- Species -->

            <div class="col-md-2">

                <select id="treeType"
                class="form-control">

                    <option>Neem</option>
                    <option>Peepal</option>
                    <option>Honge</option>
                    <option>Banyan</option>

                </select>

            </div>

            <!-- Upload Image -->

            <div class="col-md-3">

                <input type="file"
                id="treeImage"
                class="form-control">

            </div>

            <!-- Save Button -->

            <div class="col-md-2">

                <button class="btn btn-success w-100"
                onclick="saveTree()">

                Save Tree

                </button>

            </div>

        </div>

    </div>

</div>

<!-- Map Section -->

<div class="container mt-5 mb-5">

    <h2 class="text-success text-center mb-4">

        🌍 Tree Mapping System

    </h2>

    <div id="map"
    style="height:600px;
    border-radius:15px;">

    </div>

</div>

<!-- Tree List -->

<div class="container mt-5">

    <h2 class="text-success mb-4">

        🌳 Saved Trees

    </h2>

    <div class="row"
    id="treeList">

    </div>

</div>

<!-- Delete All Trees -->

<div class="container text-center mb-5 mt-4">

    <button class="btn btn-danger"
    onclick="clearTrees()">

    Delete All Trees

    </button>

</div>

<!-- Leaflet JS -->

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- DARK MODE SCRIPT -->

<script>

function toggleDarkMode(){

    document.body.classList.toggle("dark-mode");

    if(document.body.classList.contains("dark-mode")){

        localStorage.setItem("theme","dark");

    }else{

        localStorage.setItem("theme","light");

    }

}

// LOAD SAVED THEME

window.addEventListener("load", function(){

    let theme = localStorage.getItem("theme");

    if(theme === "dark"){

        document.body.classList.add("dark-mode");

    }

});

</script>

<!-- App JS -->

<script src="js/app.js"></script>

</body>

</html>
