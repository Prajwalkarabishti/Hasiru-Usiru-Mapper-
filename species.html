<!DOCTYPE html>
<html>
<head>

    <title>Species Guide</title>

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

</head>

<body style="background:#f4fff4;">

<div class="container mt-5">

    <h1 class="text-success text-center">
        🌳 Native Tree Species
    </h1>

    <div class="row mt-5">

        <div class="col-md-4">

            <div class="card shadow p-4">

                <h3>Neem Tree</h3>

                <p>
                    Medicinal tree with high oxygen production.
                </p>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow p-4">

                <h3>Peepal Tree</h3>

                <p>
                    Produces oxygen continuously.
                </p>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card shadow p-4">

                <h3>Honge Tree</h3>

                <p>
                    Eco-friendly native tree species.
                </p>

            </div>

        </div>

    </div>

</div>

</body>
</html>
