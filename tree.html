<!DOCTYPE html>
<html>

<head>

    <title>Saved Trees</title>

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-success text-center mb-5">

        🌳 Saved Trees

    </h1>

    <div class="row"
    id="treeList">

    </div>

</div>

<script>

    let trees =
    JSON.parse(localStorage.getItem("trees")) || [];

    let output = "";

    if(trees.length == 0){

        output = `

        <h3 class="text-danger text-center">

            No Trees Added

        </h3>

        `;

    }

    else{

        trees.forEach(tree => {

            output += `

            <div class="col-md-4 mb-4">

                <div class="card shadow">

                    <img src="${tree.image}"
                    height="250"
                    class="card-img-top">

                    <div class="card-body">

                        <h3 class="text-success">

                            ${tree.name}

                        </h3>

                        <p>

                            <b>Location:</b>
                            ${tree.location}

                        </p>

                        <p>

                            <b>Species:</b>
                            ${tree.type}

                        </p>

                    </div>

                </div>

            </div>

            `;

        });

    }

    document.getElementById("treeList")
    .innerHTML = output;

</script>

</body>

</html>
